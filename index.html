<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Clementina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

    <header>
        <h1>CLEMENTINA</h1>
        <p>Instituto de Cálculo · UBA · 1961</p>
    </header>

    <div class="panel">
        <span class="led"></span>
        READY
    </div>

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>-</button>

        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>+</button>

        <button class="wide">C</button>
        <button class="wide">←</button>

    </div>

    <footer>
        ♪ Oh my darling, Clementine...
    </footer>

</div>

</body>
</html>
